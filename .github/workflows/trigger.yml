name: Trigger Oracle A1 Watcher

on:
  schedule:
    - cron: '5 * * * *'  # co godzine o 5 minucie (unika przeciazen)
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger oracle-a1-watcher
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/popabobr/oracle-a1-watcher/actions/workflows/oracle-a1-check.yml/dispatches \
            -d '{"ref":"main"}'
          echo " - Triggered oracle-a1-watcher at $(date)"
